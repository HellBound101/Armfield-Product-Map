<style>
  :root {
    --bg: oklch(99% 0.003 240);
    --surface-1: oklch(97.5% 0.004 240);
    --surface-2: oklch(95.5% 0.006 240);
    --hairline: oklch(90% 0.008 240);
    --hairline-strong: oklch(82% 0.01 240);
    --ink: oklch(18% 0.012 240);
    --ink-mid: oklch(42% 0.012 240);
    --ink-dim: oklch(58% 0.012 240);
    --accent: oklch(50% 0.14 245);
    --accent-border: oklch(85% 0.05 245);
    --accent-wash: oklch(96% 0.025 245);
    --sans: 'Inter Tight', system-ui, -apple-system, sans-serif;
    --display: 'Inter Tight', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in oklch, var(--bg) 85%, transparent);
    backdrop-filter: saturate(150%) blur(14px);
    -webkit-backdrop-filter: saturate(150%) blur(14px);
    border-bottom: 1px solid var(--hairline);
  }
  .topbar-inner {
    max-width: 1120px; margin: 0 auto;
    padding: 14px 48px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer; padding: 0;
    font-family: var(--display); font-size: 14px; color: var(--ink);
    letter-spacing: -0.005em; font-weight: 500;
  }
  .logo-mark {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--ink); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
  }
  .topbar-right {
    display: flex; gap: 6px; align-items: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-dim); letter-spacing: 0.08em;
  }

  .fade-in { animation: fade-in 260ms ease-out; }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .tweaks {
    position: fixed; right: 18px; bottom: 18px; z-index: 50;
    width: 268px; background: var(--bg);
    border: 1px solid var(--hairline); border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    font-family: var(--sans); padding: 14px 16px 16px;
  }
  .tweaks h4 {
    margin: 0 0 10px; font-size: 11px; letter-spacing: 0.14em;
    font-family: var(--mono); color: var(--ink-dim); font-weight: 500;
  }
  .tweaks-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .tweaks-row > span { font-size: 11px; color: var(--ink-dim); }
  .tweaks-seg { display: flex; gap: 2px; padding: 2px; background: var(--surface-2); border-radius: 6px; }
  .tweaks-seg button {
    flex: 1; padding: 6px 8px; border: none; background: transparent;
    border-radius: 4px; font-size: 11px; color: var(--ink-dim); cursor: pointer;
    font-family: inherit;
  }
  .tweaks-seg button.on { background: var(--bg); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
</style>

      style={{ borderRadius: 10, border: '1px solid var(--hairline)', background: 'var(--bg)', overflow: 'hidden', display: 'flex', flexDirection: 'column', transition: 'all 180ms', transform: hover ? 'translateY(-2px)' : 'translateY(0)', boxShadow: hover ? '0 8px 24px rgba(0,0,0,0.06)' : '0 1px 0 rgba(0,0,0,0.02)' }}>
      <PlaceholderImage label={product.id} productId={product.id} />
      <div style={{ padding: '18px 20px 20px', display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
          <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-dim)', letterSpacing: '0.04em' }}>{product.id}</span>
          <Chip tone={product.use === 'Teaching' ? 'teach' : 'research'}>{product.use}</Chip>
        </div>
        <div style={{ fontFamily: 'var(--display)', fontSize: 17, fontWeight: 500, color: 'var(--ink)', letterSpacing: '-0.005em', lineHeight: 1.25 }}>{product.name}</div>
        <div style={{ fontSize: 13, color: 'var(--ink-mid)', lineHeight: 1.5, flex: 1 }}>{product.desc}</div>
        <button onClick={onClick} style={{ marginTop: 8, padding: '9px 14px', borderRadius: 6, background: hover ? 'var(--ink)' : 'var(--surface-2)', color: hover ? 'var(--bg)' : 'var(--ink)', border: '1px solid ' + (hover ? 'var(--ink)' : 'var(--hairline)'), fontFamily: 'var(--sans)', fontSize: 13, cursor: 'pointer', transition: 'all 160ms', textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>View details</span><span>→</span>
        </button>
      </div>
    </div>
  );
};

const Products = ({ major, category, data, filter, onBack, onBackToMajor, onPickProduct }) => {
  const products = data.products.filter(p => p.cat === category.id && (filter === 'All' || p.use === filter));
  const allInCat = data.products.filter(p => p.cat === category.id);
  return (
    <div className="fade-in" style={{ maxWidth: 1120, margin: '0 auto', padding: '40px 48px 96px' }}>
      <Crumb items={[{ label: 'All disciplines', onClick: onBack }, { label: major.name, onClick: onBackToMajor }, { label: category.name }]} />
      <div style={{ margin: '28px 0 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <h1 style={{ fontFamily: 'var(--display)', fontWeight: 500, fontSize: 36, letterSpacing: '-0.02em', margin: '0 0 8px', color: 'var(--ink)' }}>{category.name}</h1>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <Chip tone="code">{category.series}</Chip>
            <Chip>{category.tag}</Chip>
          </div>
        </div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-dim)', letterSpacing: '0.08em' }}>
          {products.length} / {allInCat.length} SHOWN{filter !== 'All' && <span> · FILTERED: {filter.toUpperCase()}</span>}
        </div>
      </div>
      {products.length === 0 ? (
        <div style={{ padding: '64px 24px', textAlign: 'center', color: 'var(--ink-dim)', border: '1px dashed var(--hairline)', borderRadius: 10 }}>
          No {filter.toLowerCase()} products in this category.
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 20 }}>
          {products.map(p => <ProductCard key={p.id} product={p} onClick={() => onPickProduct(p.id)} />)}
        </div>
      )}
    </div>
  );
};

// ── Product Detail ────────────────────────────────────────────────────────────
const DetailMeta = ({ k, v }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
    <span style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.14em', color: 'var(--ink-dim)', textTransform: 'uppercase' }}>{k}</span>
    <span style={{ fontSize: 13, color: 'var(--ink)' }}>{v}</span>
  </div>
);

const Section = ({ title, children }) => (
  <section>
    <h3 style={{ fontFamily: 'var(--display)', fontWeight: 500, fontSize: 14, letterSpacing: '-0.005em', margin: '0 0 12px', color: 'var(--ink)' }}>{title}</h3>
    {children}
  </section>
);

const ProductDetail = ({ product, data, onBackHome, onBackToMajor, onBackToCategory, onPickProduct }) => {
  const cat = data.categories[product.cat];
  const major = data.majors.find(m => m.categories.includes(product.cat));
  const related = (product.related || []).map(id => data.products.find(p => p.id === id)).filter(Boolean);
  return (
    <div className="fade-in" style={{ maxWidth: 1120, margin: '0 auto', padding: '40px 48px 96px' }}>
      <Crumb items={[
        { label: 'All disciplines', onClick: onBackHome },
        ...(major ? [{ label: major.name, onClick: onBackToMajor }] : []),
        { label: cat.name, onClick: onBackToCategory },
        { label: product.id },
      ]} />
      <div style={{ marginTop: 36, display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 56, alignItems: 'flex-start' }}>
        <div>
          <PlaceholderImage label={product.id + ' · DETAIL'} tall productId={product.id} />
          <div style={{ marginTop: 18, padding: '14px 16px', borderRadius: 8, background: 'var(--surface-1)', border: '1px solid var(--hairline)', display: 'flex', gap: 20, fontSize: 12, color: 'var(--ink-mid)', fontFamily: 'var(--sans)' }}>
            <DetailMeta k="Model" v={<span style={{ fontFamily: 'var(--mono)' }}>{product.id}</span>} />
            <DetailMeta k="Series" v={cat.series} />
            <DetailMeta k="Intended for" v={product.use} />
          </div>
        </div>
        <div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
            <Chip tone="code">{product.id}</Chip>
            <Chip>{cat.name}</Chip>
            <Chip tone={product.use === 'Teaching' ? 'teach' : 'research'}>{product.use}</Chip>
          </div>
          <h1 style={{ fontFamily: 'var(--display)', fontWeight: 500, fontSize: 40, letterSpacing: '-0.02em', margin: '0 0 20px', color: 'var(--ink)', lineHeight: 1.1 }}>{product.name}</h1>
          <p style={{ fontSize: 16, color: 'var(--ink-mid)', lineHeight: 1.55, margin: '0 0 32px' }}>{product.desc}</p>
          <Section title="Key experiments & applications">
            <ul style={{ margin: 0, padding: 0, listStyle: 'none' }}>
              {product.experiments.map((e, i) => (
                <li key={i} style={{ padding: '11px 0', borderTop: i === 0 ? '1px solid var(--hairline)' : 'none', borderBottom: '1px solid var(--hairline)', display: 'flex', gap: 12, alignItems: 'flex-start', fontSize: 14, color: 'var(--ink)', lineHeight: 1.45 }}>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-dim)', paddingTop: 2, minWidth: 22, letterSpacing: '0.05em' }}>{String(i + 1).padStart(2, '0')}</span>
                  <span>{e}</span>
                </li>
              ))}
            </ul>
          </Section>
          <div style={{ display: 'flex', gap: 10, marginTop: 28 }}>
            <button style={{ padding: '11px 18px', borderRadius: 7, background: 'var(--ink)', color: 'var(--bg)', border: 'none', fontSize: 14, fontFamily: 'var(--sans)', cursor: 'pointer' }}>Request quote</button>
            <button style={{ padding: '11px 18px', borderRadius: 7, background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--hairline)', fontSize: 14, fontFamily: 'var(--sans)', cursor: 'pointer' }}>Download datasheet</button>
          </div>
        </div>
      </div>
      {related.length > 0 && (
        <div style={{ marginTop: 80 }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.14em', color: 'var(--ink-dim)', marginBottom: 14 }}>RELATED PRODUCTS</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12 }}>
            {related.map(r => (
              <button key={r.id} onClick={() => onPickProduct(r.id)}
                style={{ textAlign: 'left', padding: '16px 18px', borderRadius: 8, border: '1px solid var(--hairline)', background: 'var(--bg)', cursor: 'pointer', fontFamily: 'inherit', transition: 'all 160ms' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'var(--surface-1)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-dim)', marginBottom: 4 }}>{r.id}</div>
                <div style={{ fontSize: 14, color: 'var(--ink)', marginBottom: 6 }}>{r.name}</div>
                <Chip tone={r.use === 'Teaching' ? 'teach' : 'research'}>{r.use}</Chip>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const data = window.ARMFIELD_DATA;

  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('armfield-route')) || { level: 'home' }; }
    catch { return { level: 'home' }; }
  });
  useEffect(() => {
    try { localStorage.setItem('armfield-route', JSON.stringify(route)); } catch {}
  }, [route]);

  const [query, setQuery] = useState('');
  const [filter, setFilter] = useState('All');

  const go = (r) => setRoute(r);
  const home = () => { setQuery(''); go({ level: 'home' }); };

  const major = route.major ? data.majors.find(m => m.id === route.major) : null;
  const category = route.cat ? { id: route.cat, ...data.categories[route.cat] } : null;
  const product = route.product ? data.products.find(p => p.id === route.product) : null;

  const jumpProduct = (pid) => {
    const p = data.products.find(x => x.id === pid);
    if (!p) return;
    const parentMajor = data.majors.find(m => m.categories.includes(p.cat));
    go({ level: 'product', major: parentMajor ? parentMajor.id : null, cat: p.cat, product: pid });
  };

  return (
    <div>
      <header className="topbar">
        <div className="topbar-inner">
          <button className="logo" onClick={home}>
            <span className="logo-mark">A</span>
            <span>Product Explorer</span>
            <span style={{ color: 'var(--ink-dim)', fontWeight: 400, marginLeft: 4 }}>· Armfield equipment catalogue</span>
          </button>
          <div className="topbar-right">
            <span>{data.products.length} MODELS</span>
          </div>
        </div>
      </header>

      {route.level === 'home' && (
        <Landing data={data} query={query} setQuery={setQuery} filter={filter} setFilter={setFilter}
          onPickMajor={(id) => go({ level: 'major', major: id })} onJumpProduct={jumpProduct} />
      )}
      {route.level === 'major' && major && (
        <Categories major={major} data={data} filter={filter} onBack={home}
          onPickCategory={(cid) => go({ level: 'category', major: major.id, cat: cid })} />
      )}
      {route.level === 'category' && major && category && (
        <Products major={major} category={category} data={data} filter={filter} onBack={home}
          onBackToMajor={() => go({ level: 'major', major: major.id })}
          onPickProduct={(pid) => go({ level: 'product', major: major.id, cat: category.id, product: pid })} />
      )}
      {route.level === 'product' && product && (
        <ProductDetail product={product} data={data} onBackHome={home}
          onBackToMajor={() => major && go({ level: 'major', major: major.id })}
          onBackToCategory={() => go({ level: 'category', major: major ? major.id : null, cat: product.cat })}
          onPickProduct={jumpProduct} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
